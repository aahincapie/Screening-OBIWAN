[theme]
# Dark-locked by design. One theme for the whole app: charts, map tiles and
# provenance colours are all tuned against a near-black forest ground so that
# uncertainty stays legible. No section inverts to light. These values are mirrored
# as CSS tokens in src/ui/components.py and as chart constants in src/ui/charts.py,
# so change all three together.
#
# Palette: near-black forest surface, off-white ink (never pure #000 or #fff), a
# single brightened forest-green accent, semantic red/blue/amber reserved for meaning.
base = "dark"
primaryColor = "#17A05C"
backgroundColor = "#0E1512"
secondaryBackgroundColor = "#151D19"
textColor = "#E7EEE9"
font = "sans serif"

[server]
maxUploadSize = 5
# The AOI cap is 1 MB (enforced in src/aoi.py); 5 MB here leaves room for zipped
# shapefiles, whose sidecar files inflate the archive well beyond the geometry itself.

[browser]
gatherUsageStats = false
