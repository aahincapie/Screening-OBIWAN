[theme]
# Light-locked by design. Charts, map tiles and provenance colours are all tuned
# against a white ground, and a half-working dark mode would undermine the one thing
# this UI has to get right: making uncertainty legible. The CSS tokens in
# src/ui/components.py mirror these values, so change both together.
base = "light"
primaryColor = "#0F7B47"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#F4F7F5"
textColor = "#16211D"
font = "sans serif"

[server]
maxUploadSize = 5
# The AOI cap is 1 MB (enforced in src/aoi.py); 5 MB here leaves room for zipped
# shapefiles, whose sidecar files inflate the archive well beyond the geometry itself.

[browser]
gatherUsageStats = false
